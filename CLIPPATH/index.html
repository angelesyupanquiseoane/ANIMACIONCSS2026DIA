<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLIPATH SEMANA 6</title>
    <style>
        *{
            padding: 0px;
            margin: 0px;
        }
        .contenedor{
            width: 600px;
            height: 600px;
            border: 1px solid black;
            position: relative;
            margin: 0 auto;
            background-image: url(img/fondo.avif);
            background-size: cover;
            background-position: center;
            overflow: hidden;
            z-index: -1;

        }
        .gorro{
            width: 200px;
            height: 180px;
            background-image: url(img/gorro.webp);
            background-size: cover;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            position: absolute;
            top: 20px;
            left: 190px;
        }
        .cabeza{
            width: 180px;
            height: 180px;
            background-color: rgb(255, 237, 150);
            background-image: url(img/cara.png);
            background-size: cover;
            clip-path: circle(50% at 50% 20%);
            position: absolute;
            top: 180px;
            left: 200px;
            z-index: -1;
        }
        .cuerpo{
            width: 200px;
            height: 200px;
            background-image: url(img/pantalon.webp);
            background-size: cover;
            clip-path: polygon(34% 0, 65% 0, 85% 100%, 14% 100%);
            position: absolute;
            top: 300px;
            left: 190px;
        }
        .brazos{
            width: 320px;
            height: 180px;
            background-image: url(img/brazos.jpg);
            background-size: cover;
            clip-path: polygon(14% 34%, 86% 33%, 100% 50%, 88% 64%, 14% 64%, 0% 50%);
            position: absolute;
            top: 300px;
            left: 130px;
            z-index: -1;

            animation: brazo 2s  infinite alternate;
        }
        @keyframes brazo{
            0%{
                 transform: rotate(-10deg);
                
            }100%{
                transform: rotate(5deg);

            }
        }
        .pie1{
            width: 230px;
            height: 180px;
            background-image: url(img/zapatos.avif);
            background-size: cover;
            clip-path: ellipse(25% 13% at 50% 50%);
            position: absolute;
            top: 430px;
            left: 125px;

        }
        .pie2{
            width: 230px;
            height: 180px;
            background-image: url(img/zapatos.avif);
            background-size: cover;
            clip-path: ellipse(25% 13% at 50% 50%);
            position: absolute;
            top: 430px;
            left: 240px;

        }
        .cono{
            width: 230px;
            height: 180px;
            background-image: url(img/cono.avif);
            background-size: cover;
            clip-path: polygon(46% 79%, 26% 21%, 64% 21%);
            position: absolute;
            top: 290px;
            left: 355px;

            animation: cono 2s infinite alternate;
        }
        @keyframes cono{
            0%{
                 transform: rotate(-10deg);
                
            }100%{
                transform: rotate(5deg);

            }
        }
        .helado1{
            width: 70px;
            height: 70px;
            background-image: url(img/helado1.webp);
            background-size: cover;
            clip-path: circle(50% at 50% 50%);
            position: absolute;
            top: 287px;
            left: 390px;

            animation: bola1 2s infinite alternate;
        }
         @keyframes bola1{
            0%{
                 transform: rotate(-10deg);
                
            }100%{
                transform: rotate(5deg);

            }
        }
        .helado2{
            width: 70px;
            height: 70px;
            background-image: url(img/bola3.webp);
            background-size: cover;
            clip-path: circle(50% at 50% 50%);
            position: absolute;
            top: 285px;
            left: 450px;

            animation: bola2 2s infinite alternate;
        }
         @keyframes bola2{
            0%{
                 transform: rotate(-10deg);
                
            }100%{
                transform: rotate(5deg);

            }
        }
        .helado3{
            width: 75px;
            height: 75px;
            background-image: url(img/helado3.webp);
            background-size: cover;
            clip-path: circle(50% at 50% 50%);
            position: absolute;
            top: 250px;
            left: 420px;

            animation: bola3 2s infinite alternate;
        }
         @keyframes bola3{
            0%{
                 transform: rotate(-10deg);
                
            }100%{
                transform: rotate(5deg);

            }
        }

        .nube1{
            width: 100px;
            height: 80px;
            background-image: url(img/nube.png);
            background-size: cover;
            position: absolute;
            top: 0px;
            left: 0px;

            animation: nube1 2s 1 forwards;
        }
        @keyframes nube1{
            0%{
                top: 0px;
                left: -120px;
            }
        }
        .nube2{
            width: 70px;
            height: 50px;
            background-image: url(img/nube.png);
            background-size: cover;
            position: absolute;
            top: 80px;
            left: 60px;

            animation: nube2 2s 1 forwards;
        }
        @keyframes nube2{
            0%{
                top: 0px;
                left: -120px;
            }
        }
        .boton{
        position: absolute;
        left: 10px;
        top: 10px;
        padding: 10px 20px;
        background-color: rgb(230, 107, 144);
        border: none;
        }
        .boton a{
          color: rgb(255, 255, 255);
          text-decoration: none;
        }
        .parallax{
            position: absolute;
            left: 100px;
            top: 10px;
            padding: 10px 20px;
            color: rgb(230, 107, 144);
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <div class="gorro"></div>
        <div class="cabeza"></div>
        <div class="cuerpo"></div>
        <div class="brazos"></div>
        <div class="pie1"></div>
        <div class="pie2"></div>
        <div class="cono"></div>
        <div class="helado1"></div>
        <div class="helado2"></div>
        <div class="helado3"></div>
        <div class="nube1"></div>
        <div class="nube2"></div>
    </div>
    <a href="../PARALLAX/index.html" class="parallax">Tarea Parallax</a>
    <button class="boton">
        <a href="../index.html">volver</a>
    </button>
</body>
</html>
