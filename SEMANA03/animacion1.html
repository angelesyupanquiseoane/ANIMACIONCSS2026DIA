<html>
<head>
    <title> Animacion 3 Css</title>
    <style>
    *{
        padding : 0px;
        margin : 0px;
    }
    .contenedor{
        width: 400px;
        height: 200px;
        border : 1px solid black ;
        background-color:black;
        position: relative;
        margin: 0 auto;

        overflow: hidden;  /* muestra solo lo interior */
    }

    .cuadrito{
        width: 100px;
        height: 100px;
        background-color: red;
        position: absolute;
        top: 50px;
        left: 150px;

        animation: cuadrito 3s infinite linear;
    }

    @keyframes cuadrito{
        from{
           top: 0px; 
        }
        to{
            top: 100px;
        }
    }
    .boton{
        position: absolute;
        left: 10px;
        top: 10px;
        padding: 10px 20px;
        background-color: rgb(230, 107, 144);
        border: none;
        }
    .boton a{
        color: rgb(255, 255, 255);
        text-decoration: none;
    }
    </style>
</head>
<body>
    <div class ="contenedor">
        <div class ="cuadrito"></div>
    </div>
    <button class="boton">
        <a href="index.html">volver</a>
    </button>
</body>
</html>
