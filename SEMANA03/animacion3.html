<html>
<head>
    <title> Animacion 3 Css</title>
    <style>
    *{
        padding : 0px;
        margin : 0px;
    }
    .contenedor{
        width: 400px;
        height: 200px;
        border : 1px solid black ;
        position: relative;
        margin: 0 auto;

        overflow: hidden;  /* muestra solo lo interior */
    }

    .cuadrito{
        width: 100px;
        height: 100px;
        background-color: red;
        position: absolute;
        top: 0px;
        left: 0px;

        animation: cuadrito 3s infinite linear;
    }

    @keyframes cuadrito{
        from{
        top: 0px; /* arriba o abajo */
        left: 0px; /* izquierda o derecha */
        }
       to{
        top: 100px;
        left: 300px;
        }
    }
    </style>
</head>
<body>
    <div class ="contenedor">
        <div class ="cuadrito"></div>
    </div>
</body>
</html>
