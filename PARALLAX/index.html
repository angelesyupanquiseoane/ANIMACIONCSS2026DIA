<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>animacion</title>
</head>
<style>
    *{
        margin: 0px;
        padding: 0px;
        
    }
    body{
        background-color: black
    }
    .contenedor{
        width: 500px;
        height:800px;
        position: relative;
        margin: 0 auto;
        overflow: hidden;
    }
    .fondo{
        width: 500px;
        height: 800px;
        background-image: url(img/cielito.avif);
        background-size: cover;
        position: absolute;
        background-position: center;
        z-index: -1;

        animation: fondo 10s 1 forwards;
    }
    @keyframes fondo{
        0%{
            transform: scale(1);

        }
        100%{
            transform: scale(1.3);
        }
    }
    .casa{
        width: 350px;
        height: 430px;
        background-image: url(img/casa.png);
        background-size: cover;
        position: absolute;
        top: -40px;
        left: 170px;
        
        animation: castillo 16s 1 forwards;
    }
    @keyframes castillo{
        0%{
            top: -300px;
        }
        100%{
            top: -10px;
        }
    }
    .nube{
    width:500px;
    height:500px;
    background-image:url(img/nube.png);
    background-size:cover;
    position:absolute;
    top:340px;
    left:-75px;

    animation: nube 6s 1 forwards;
    }
    @keyframes nube{
        0%{
         left: -500px;
       }
       100%{
        left: -100px;
       }
    }
    .nube2{
    width:300px;
    height:300px;
    background-image:url(img/nube.png);
    background-size:cover;
    position:absolute;
    top:500px;

    animation: nube2 25s 1 forwards;
}

@keyframes nube2{
    0%{
        left:-300px;
    }
    100%{
        left:300px;
    }
}
.boton{
    position: absolute;
    left: 10px;
    top: 10px;
    padding: 10px 20px;
    background-color: rgb(230, 107, 144);
    border: none;
    }
.boton a{
    color: rgb(255, 255, 255);
    text-decoration: none;
}
</style>
<body>
    <div class="contenedor">
        <div class="fondo"></div>
        <div class="casa"></div>
        <div class="nube"></div>
        <div class="nube2"></div>
    </div>
    <button class="boton">
        <a href="../CLIPPATH/index.html">volver</a>
    </button>
    <audio autoplay loop>
    <source src="./img/musica.mp3" type="audio/mpeg">
    </audio>
</body>

</html>
